name: Publish to NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for NuGet Trusted Publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Build
        run: dotnet build src/ArabicRt/ArabicRt.csproj -c Release

      - name: Pack
        run: dotnet pack src/ArabicRt/ArabicRt.csproj -c Release --no-build -o nupkgs

      - name: Push to NuGet (Trusted Publishing — no API key needed)
        run: dotnet nuget push nupkgs/*.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate
